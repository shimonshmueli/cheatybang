name: Bug report
description: Something in the UI is broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting. The more detail you give, the faster it gets fixed.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect vs. what did you see?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Set environment to VS Code
        2. Search for "hooks"
        3. Click the first result
        4. ...
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome / Chromium
        - Safari
        - Firefox
        - Edge
        - Other
    validations:
      required: true

  - type: dropdown
    id: theme
    attributes:
      label: Theme
      options:
        - Light
        - Dark
        - Not sure / didn't check
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, console errors, or additional context.
    validations:
      required: false
